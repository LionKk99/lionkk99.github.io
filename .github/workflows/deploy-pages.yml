# 部署 Clarity 静态站点到 GitHub Pages
# 在仓库 Settings > Pages > Build and deployment > Source 中选择 "GitHub Actions"
name: Deploy to GitHub Pages

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 验证：检查关键文件存在并可访问，确保站点结构正确
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required files
        run: |
          test -f clarity.html || (echo "Missing clarity.html" && exit 1)
          test -f minimal.html || (echo "Missing minimal.html" && exit 1)
          test -d assets || (echo "Missing assets/" && exit 1)
          test -d clarity || (echo "Missing clarity/" && exit 1)
          echo "All required files and directories present."

  # 仅在有 push 时部署到 GitHub Pages
  deploy:
    if: github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
