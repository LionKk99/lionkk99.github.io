<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kaleido Cover 3D Demo</title>
    <style>
      :root {
        --bg: #0b0e14;
        --fg: #e8eefc;
        --muted: rgba(232, 238, 252, 0.7);
        --card: rgba(255, 255, 255, 0.06);
        --border: rgba(255, 255, 255, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial,
          "Apple Color Emoji", "Segoe UI Emoji";
        background: radial-gradient(1200px 900px at 20% 10%, rgba(72, 95, 170, 0.55), transparent 55%),
          radial-gradient(900px 800px at 80% 60%, rgba(178, 94, 140, 0.4), transparent 60%),
          var(--bg);
        color: var(--fg);
      }

      .wrap {
        max-width: 1100px;
        margin: 0 auto;
        padding: 28px 18px 60px;
      }

      header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 18px;
        margin-bottom: 14px;
      }

      h1 {
        font-size: 20px;
        margin: 0;
        font-weight: 650;
        letter-spacing: 0.2px;
      }

      .hint {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.4;
        margin: 0;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        overflow: hidden;
        backdrop-filter: blur(10px);
      }

      .blog-cover {
        position: relative;
        width: 100%;
      }

      /* Desktop: p5.js canvas */
      #desktop-cover {
        display: none;
      }

      /* Mobile fallback: 2-layer image to match your existing structure */
      #mobile-cover {
        display: block;
        aspect-ratio: 3 / 4;
      }

      #mobile-cover img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        transform: scale(1.02);
      }

      #mobile-cover img.background {
        filter: blur(10px) saturate(1.05);
        opacity: 0.65;
      }

      #mobile-cover img.foreground {
        filter: contrast(1.05) saturate(1.02);
        opacity: 1;
      }

      @media (min-width: 1200px) {
        #desktop-cover {
          display: block;
        }
        #mobile-cover {
          display: none;
        }
      }

      .footer {
        margin-top: 12px;
        color: var(--muted);
        font-size: 13px;
      }

      .footer code {
        color: rgba(232, 238, 252, 0.9);
      }
    </style>

    <!-- p5.js (global mode) -->
    <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
  </head>
  <body>
    <div class="wrap">
      <header>
        <h1>Kaleido 3D Cover（p5.js / WEBGL）</h1>
        <p class="hint">桌面端可拖拽旋转；小屏自动降级为静态图片。</p>
      </header>

      <section class="card">
        <div class="blog-cover" id="desktop-cover">
          <script src="cover/kaleido_cover.js"></script>
        </div>

        <div class="blog-cover" id="mobile-cover">
          <img class="foreground" src="/assets/figures/kaleido.png" alt="Kaleido" />
          <img class="background" src="/assets/figures/kaleido.png" alt="Kaleido" />
        </div>
      </section>

      <div class="footer">
        图片来源：<code>/assets/figures/kaleido.png</code>（如需替换，改 `projects/kaleido/cover/kaleido_cover.js` 的 <code>IMG_URL</code>）。
      </div>
    </div>
  </body>
</html>
